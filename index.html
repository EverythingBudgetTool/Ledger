<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Ledger (Beta)</title>
<meta name="description" content="One list of bills, everything else follows." />

<!-- PWA / installable app metadata -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#233b39" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Ledger Beta" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-192.png" />

<!-- ALL of the app's styling — Tailwind's utilities AND The Ledger's custom
     classes — is prebuilt into styles.css by the Tailwind CLI at build time.

     A <link> stylesheet BLOCKS rendering until it's ready, which is the point:
     the old runtime CDN (commented below) compiled CSS in the browser on every
     load, so React could paint the real dashboard before any styles existed —
     that was the "flash of unstyled content" (real content, bare column, no
     layout). A blocking stylesheet makes that impossible.
     It's also service-worker cacheable, so the PWA is now genuinely offline —
     the CDN never was.

     REBUILD styles.css whenever the JSX uses a new Tailwind class, or that
     element ships unstyled. See DEPLOY-README in the build zip.

     TO REVERT to the old behavior: comment the <link>, uncomment the <script>,
     and restore the inline <style> block in the app source. -->
<link rel="stylesheet" href="./styles.css" />
<!-- <script src="https://cdn.tailwindcss.com"></script> -->

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "papaparse": "https://esm.sh/papaparse@5.4.1"
  }
}
</script>

<style>
  html, body { margin: 0; padding: 0; background: #f6f3ec; }
  #root { min-height: 100vh; }
  /* The app's ONE loading screen.
     It deliberately lives OUTSIDE #root: React's createRoot() wipes #root's
     children on mount, which used to destroy this and swap in a second, slightly
     different loading message — that hand-off was the visible "flash".
     Now this is the only loading state. It paints instantly from inline CSS with
     no dependency on the Tailwind CDN or on any JS having loaded, and the app
     removes it (adds .done, then removes the node) once data is actually ready.
     See the useEffect in FamilyBudgetApp that dismisses it. */
  #boot-loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #f6f3ec; font-family: -apple-system, sans-serif; color: #6b6459; font-size: 14px;
    z-index: 9999; transition: opacity .18s ease-out; flex-direction: column; gap: 14px;
    text-align: center; padding: 24px;
  }
  #boot-loading.done { opacity: 0; pointer-events: none; }
  #boot-stuck { display: none; max-width: 320px; line-height: 1.5; }
  #boot-loading.stuck #boot-stuck { display: block; }
  #boot-stuck button {
    margin-top: 12px; background: #2f6f6b; color: #f6f3ec; border: none; border-radius: 999px;
    padding: 10px 22px; font-size: 14px; font-weight: 600;
  }
</style>
</head>
<body>
<!-- OUTSIDE #root on purpose — see the #boot-loading comment above. -->
<div id="boot-loading">
  <div>Loading The Ledger…</div>
  <div id="boot-stuck">
    This is taking longer than usual. You may be offline, or a required file
    didn't load.
    <br /><button onclick="location.reload()">Reload</button>
  </div>
</div>
<div id="root"></div>

<script>
  // Watchdog: if the app never mounts at all — a failed CDN fetch, a bad import, an
  // ESM error — then no app code ever runs, nothing removes this screen, and the
  // user stares at "Loading The Ledger…" forever with no idea why. That's a worse
  // failure than the flash this design was meant to fix, so the guard has to live
  // HERE, in plain inline JS that depends on nothing.
  setTimeout(function () {
    var el = document.getElementById("boot-loading");
    if (el && document.body.contains(el)) el.classList.add("stuck");
  }, 8000);
</script>

<script src="./storage-shim.js"></script>
<script type="module" src="./main.js"></script>
</body>
</html>
